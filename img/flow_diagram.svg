<svg viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="620" height="320" fill="#16182e"/>

  <!-- ================= TOP FLOW ================= -->
  <text x="35" y="42" fill="#ffffff" font-size="17" font-weight="700">Standard Offload Flow (Memory Wall)</text>

  <!-- Input Tokens -->
  <rect x="35" y="62" width="120" height="52" rx="12" fill="#2b3350" stroke="#7a869a" stroke-width="1.5"/>
  <text x="95" y="93" fill="#e6e9f0" font-size="13" text-anchor="middle">Input Tokens</text>

  <!-- connector solid -->
  <line x1="155" y1="88" x2="215" y2="88" stroke="#7a869a" stroke-width="2"/>

  <!-- RAM Bottleneck -->
  <rect x="215" y="62" width="140" height="52" rx="12" fill="#f2545b"/>
  <text x="285" y="93" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">RAM Bottleneck</text>

  <!-- connector dashed -->
  <line x1="355" y1="88" x2="425" y2="88" stroke="#7a869a" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- GPU Idle Wait -->
  <rect x="425" y="62" width="150" height="52" rx="12" fill="#2b3350" stroke="#7a869a" stroke-width="1.5"/>
  <text x="500" y="93" fill="#c3c9d6" font-size="13" text-anchor="middle">GPU (Idle Wait)</text>

  <!-- ================= BOTTOM FLOW ================= -->
  <text x="35" y="182" fill="#ffffff" font-size="17" font-weight="700">Hybrid Offload Flow (Physical-Core + GPU)</text>

  <!-- Input Tokens -->
  <rect x="35" y="205" width="120" height="52" rx="12" fill="#2b3350" stroke="#7a869a" stroke-width="1.5"/>
  <text x="95" y="236" fill="#e6e9f0" font-size="13" text-anchor="middle">Input Tokens</text>

  <!-- connector -->
  <line x1="155" y1="231" x2="200" y2="231" stroke="#3aa0ff" stroke-width="2.5"/>

  <!-- Hybrid Layer + KV Offload -->
  <rect x="200" y="200" width="160" height="62" rx="12" fill="#1e2a5c"/>
  <text x="280" y="225" fill="#ffffff" font-size="12.5" font-weight="700" text-anchor="middle">Hybrid Layer + KV Offload</text>
  <text x="280" y="245" fill="#9fb3d1" font-size="11" text-anchor="middle">VRAM + System RAM</text>

  <!-- split connectors to CPU and GPU -->
  <line x1="360" y1="220" x2="400" y2="200" stroke="#3aa0ff" stroke-width="2.5"/>
  <line x1="360" y1="242" x2="400" y2="262" stroke="#3aa0ff" stroke-width="2.5"/>

  <!-- AVX-512 CPU -->
  <rect x="400" y="178" width="125" height="44" rx="10" fill="#2f74a8"/>
  <text x="462" y="205" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">AVX-512 CPU</text>

  <!-- CUDA GPU -->
  <rect x="400" y="240" width="125" height="44" rx="10" fill="#2c7a7b"/>
  <text x="462" y="267" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">CUDA GPU</text>

  <!-- merge connectors to Output -->
  <line x1="525" y1="200" x2="555" y2="231" stroke="#25b892" stroke-width="2.5"/>
  <line x1="525" y1="262" x2="555" y2="231" stroke="#25b892" stroke-width="2.5"/>

  <!-- Output -->
  <rect x="545" y="205" width="65" height="52" rx="12" fill="#1fae86"/>
  <text x="577" y="236" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Output</text>
</svg>
