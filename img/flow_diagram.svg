<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff416c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4b2b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#1a1a2e" />

  <!-- Standard Flow -->
  <text x="50" y="50" fill="white" font-family="Arial" font-size="20" font-weight="bold">Standard Offload Flow (Memory Wall)</text>
  <rect x="50" y="80" width="150" height="60" rx="10" fill="#303a52" stroke="#e0e0e0" stroke-width="2"/>
  <text x="125" y="115" fill="white" font-family="Arial" font-size="16" text-anchor="middle">Input Tokens</text>

  <line x1="200" y1="110" x2="280" y2="110" stroke="#e0e0e0" stroke-width="3" marker-end="url(#arrow)" />

  <rect x="280" y="80" width="150" height="60" rx="10" fill="url(#grad2)"/>
  <text x="355" y="115" fill="white" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">RAM Bottleneck</text>

  <line x1="430" y1="110" x2="510" y2="110" stroke="#e0e0e0" stroke-width="3" stroke-dasharray="5,5" />

  <rect x="510" y="80" width="150" height="60" rx="10" fill="#303a52" stroke="#e0e0e0" stroke-width="2"/>
  <text x="585" y="115" fill="white" font-family="Arial" font-size="16" text-anchor="middle">GPU (Idle Wait)</text>

  <!-- Soliton Flow -->
  <text x="50" y="220" fill="white" font-family="Arial" font-size="20" font-weight="bold">Soliton Hybrid Flow (Topological Pruning)</text>
  <rect x="50" y="250" width="150" height="60" rx="10" fill="#303a52" stroke="#e0e0e0" stroke-width="2"/>
  <text x="125" y="285" fill="white" font-family="Arial" font-size="16" text-anchor="middle">Input Tokens</text>

  <line x1="200" y1="280" x2="250" y2="280" stroke="#00f2fe" stroke-width="4" />

  <rect x="250" y="250" width="180" height="60" rx="10" fill="url(#grad1)"/>
  <text x="340" y="275" fill="white" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">KV Compression</text>
  <text x="340" y="295" fill="#a8c0ff" font-family="Arial" font-size="12" text-anchor="middle">- 20% Payload</text>

  <line x1="430" y1="280" x2="480" y2="280" stroke="#4facfe" stroke-width="4" />

  <!-- Split Execution -->
  <rect x="480" y="220" width="150" height="50" rx="10" fill="#2193b0"/>
  <text x="555" y="250" fill="white" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">AVX-512 CPU</text>

  <rect x="480" y="290" width="150" height="50" rx="10" fill="#11998e"/>
  <text x="555" y="320" fill="white" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">CUDA GPU</text>

  <line x1="630" y1="280" x2="680" y2="280" stroke="#00f2fe" stroke-width="4" />

  <rect x="680" y="250" width="100" height="60" rx="10" fill="#00bf8f"/>
  <text x="730" y="285" fill="white" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Output</text>
</svg>